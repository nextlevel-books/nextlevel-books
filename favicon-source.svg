<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund: dunkles Nachtblau wie die Seite -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#050913"/>
    </linearGradient>
    <!-- Goldverlauf: identisch mit Hero-Schriftzug auf der Seite -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5df80"/>
      <stop offset="18%"  stop-color="#c9a236"/>
      <stop offset="38%"  stop-color="#8a6818"/>
      <stop offset="55%"  stop-color="#e0c050"/>
      <stop offset="72%"  stop-color="#a07820"/>
      <stop offset="88%"  stop-color="#c9a236"/>
      <stop offset="100%" stop-color="#e8c850"/>
    </linearGradient>
    <!-- Innenschatten / Rahmenglow -->
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#c9a236" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Goldener Rahmen (1px, sehr dezent) -->
  <rect x="10" y="10" width="492" height="492" rx="82"
        fill="none" stroke="#c9a236" stroke-width="6" opacity="0.35"/>

  <!-- "NL" zentriert, bold, metallisches Gold -->
  <!-- Positioniert auf optischem Zentrum: leicht nach oben versetzt -->
  <text
    x="256"
    y="330"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-weight="900"
    font-size="260"
    letter-spacing="-8"
    fill="url(#gold)"
    filter="url(#glow)"
  >NL</text>

  <!-- Goldene Unterlinie als Markenzeichen -->
  <rect x="148" y="370" width="216" height="5" rx="2.5"
        fill="url(#gold)" opacity="0.6"/>
</svg>
